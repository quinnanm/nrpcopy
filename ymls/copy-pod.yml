apiVersion: v1
kind: Pod
metadata:
  name: copy-pod
  namespace: axol1tl
spec:
  containers:
  - name: copy-pod
    image: ubuntu:22.04
    command: ["/bin/bash", "-c", "apt-get update && apt-get install -y rsync && sleep infinity"]
    volumeMounts:
    - mountPath: /data
      name: pvc
  volumes:
  - name: pvc
    persistentVolumeClaim:
      claimName: traindatavol